kind = "web"
previewPath = "/"
title = "Sai Rolotech Industrial Ecosystem"
version = "1.0.0"
id = "artifacts/sai-rolotech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25248
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sai-rolotech run dev"

[services.env]
PORT = "25248"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sai-rolotech", "run", "build"]
publicDir = "artifacts/sai-rolotech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
